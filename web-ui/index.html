const DataContext = React.createContext(null);

const API_BASE = 'http://localhost:5050/api';
let _token = null;

async function initAuth() {
  try {
    const r = await fetch(`${API_BASE}/auth/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clientId: 'oms-client-01', clientSecret: 's3cr3t', scope: 'orders:read orders:write' }),
    });
    if (r.ok) { const d = await r.json(); _token = d.access_token || d.accessToken; }
  } catch {}
}

async function apiFetch(path) {
  const headers = _token ? { 'Authorization': `Bearer ${_token}` } : {};
  const r = await fetch(`${API_BASE}${path}`, { headers });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

function DataProvider({ children }) {
  const [data, setData] = React.useState(null);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    initAuth().then(() =>
      Promise.all([
        apiFetch('/orders?limit=200'),
        apiFetch('/inbound/purchase-orders'),
        apiFetch('/inbound/transfer-orders'),
        apiFetch('/returns'),
        apiFetch('/orders/ORD-001/timeline').catch(() => ({ events: [] })),
        apiFetch('/stock/APPLE-1KG/ledger').catch(() => null),
      ]).then(([ordersResp, poResp, toResp, returnsResp, timelineResp, stockLedger]) => {
        setData({
          orders: ordersResp.items,
          purchaseOrders: poResp.items,
          transferOrders: toResp.items,
          returns: returnsResp.items,
          orderTimeline: timelineResp.events ?? [],
          stockLedger,
        });
      }).catch(e => setError(e.message))
    );
  }, []);

  if (error) return (
    <div className="p-8 text-red-600 text-sm">
      <strong>API unavailable:</strong> {error}<br />
      <span className="text-gray-500">Start the API: <code>cd api && dotnet run</code> — then refresh.</span>
    </div>
  );
  if (!data) return (
    <div className="min-h-screen flex items-center justify-center text-gray-400 text-sm">Loading…</div>
  );
  return (
    <DataContext.Provider value={{ ...data, apiBase: API_BASE }}>
      {children}
    </DataContext.Provider>
  );
}

const SIMULATION_NOW  = new Date('2024-01-15T16:00:00Z');
const CLOSED_STATUSES = new Set(['Cancelled', 'Returned']);

function fmtOrderTime(iso) {
  if (!iso) return null;
  return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
}

function slotUrgency(slot) {
  if (!slot) return null;
  const start = new Date(slot.scheduledStart);
  const end   = new Date(slot.scheduledEnd);
  if (SIMULATION_NOW > end)    return 'overdue';
  if (SIMULATION_NOW >= start) return 'active';
  if (start - SIMULATION_NOW <= 3600000) return 'soon';
  return 'ok';
}

function orderUrgency(order) {
  if (order.status === 'OnHold') return 'critical';
  if (order.posRecalcPending)    return 'warning';
  const activeForSlot = !['Delivered','Invoiced','Collected','Paid','Cancelled','Returned'].includes(order.status);
  if (activeForSlot && order.deliverySlot) {
    const su = slotUrgency(order.deliverySlot);
    if (su === 'overdue')              return 'critical';
    if (su === 'active' || su === 'soon') return 'warning';
  }
  return null;
}

  const activeIdx = PIPELINE_STEPS.findIndex(s => s.key === activeKey);
  return (
    <div className="flex items-start gap-0 overflow-x-auto pb-1">
      {PIPELINE_STEPS.map((step, i) => {
        const done   = i < activeIdx;
        const active = i === activeIdx;
        const dotCls = PHASE_DOT[step.phase];
        const lineCls = PHASE_LINE[step.phase];
        return (
          <React.Fragment key={step.key}>
            <div className="flex flex-col items-center shrink-0" style={{ minWidth: 56 }}>
              <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border-2 transition-all
                ${active ? `${dotCls} text-white border-transparent shadow ring-2 ring-offset-1 ring-current scale-110`
                         : done   ? `${dotCls} text-white border-transparent opacity-60`
                                  : 'bg-white text-gray-300 border-gray-200'}`}>
                {done ? '✓' : i + 1}
              </div>
              <span className={`text-center leading-tight mt-1 text-xs ${active ? 'font-semibold text-gray-800' : done ? 'text-gray-400' : 'text-gray-300'}`}
                    style={{ maxWidth: 52, fontSize: 10 }}>
                {step.label}
              </span>
            </div>
            {i < PIPELINE_STEPS.length - 1 && (
              <div className={`h-0.5 mt-4 flex-1 mx-0.5 transition-all ${done ? lineCls : 'bg-gray-100'}`} style={{ minWidth: 12 }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function TimelineRow({ evt }) {

        <div className={`w-4 h-4 rounded-full border-2 border-white shadow-sm ${s.dot}`} />

        <div className="flex flex-wrap items-center gap-1.5 mb-0.5">

          <span className={`text-xs px-1.5 py-0.5 rounded font-medium ${s.badge}`}>{s.label}</span>

function fmtEvtTime(iso) {
  try {
    return new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  } catch { return iso; }
}

function normEvtType(t) {
  const m = { domain: 'domain', inbound: 'webhook', outbox: 'outbox' };
  return m[(t || '').toLowerCase()] || 'domain';
}

function LiveTimeline({ orderId, apiBase }) {
  const [data, setData]       = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError]     = React.useState(null);

  function load() {
    setLoading(true);
    setError(null);
    const h = _token ? { Authorization: `Bearer ${_token}` } : {};
    fetch(`${apiBase}/orders/${orderId}/timeline`, { headers: h })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(d  => { setData(d);  setLoading(false); })
      .catch(() => { setError('Could not load timeline — is the API running?'); setLoading(false); });
  }

  React.useEffect(() => { load(); }, [orderId]);

  return (
    <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
      <div className="flex items-center justify-between mb-4">
        <div className="text-sm font-semibold text-gray-700">
          Live Event Timeline
          {data && <span className="ml-2 font-normal text-gray-400">({data.summary.totalEvents} events)</span>}
        </div>
        <button onClick={load}
          className="text-xs text-blue-500 hover:text-blue-700 border border-blue-200 px-3 py-1 rounded-lg hover:bg-blue-50 transition-colors">
          ↻ Refresh
        </button>
      </div>

      {loading && <div className="text-center py-8 text-gray-400 text-sm">Loading…</div>}
      {error   && <div className="text-center py-6 text-red-400 text-sm">{error}</div>}

      {data && !loading && (
        <>
          <div className="flex flex-wrap gap-4 mb-5 px-1">
            {[['bg-slate-400','State Change'],['bg-emerald-500','Webhook In'],['bg-violet-500','Outbox Out']].map(([dot,lbl]) => (
              <div key={lbl} className="flex items-center gap-1.5">
                <div className={`w-3 h-3 rounded-full ${dot}`} />
                <span className="text-xs text-gray-500">{lbl}</span>
              </div>
            ))}
          </div>

          {data.events.length === 0
            ? <div className="text-xs text-gray-300 py-4 text-center">No events recorded yet</div>
            : data.events.map((e, i) => (
                <TimelineRow key={i} evt={{ ...e, time: fmtEvtTime(e.time), type: normEvtType(e.type) }} />
              ))
          }

          <div className="mt-4 p-3 bg-gray-50 border border-gray-200 rounded-xl text-xs text-gray-500 flex flex-wrap gap-4">
            <span>{data.summary.totalEvents} event{data.summary.totalEvents !== 1 ? 's' : ''}</span>
            {data.summary.totalEndToEndMinutes > 0 && (
              <><span>·</span><span>Total span: <strong className="text-gray-700">{data.summary.totalEndToEndMinutes}m</strong></span></>
            )}
          </div>
        </>
      )}
    </div>
  );
}

function OrderDetailView({ order: initialOrder, onBack, onViewTimeline, onOrderUpdated }) {
  const { apiBase } = React.useContext(DataContext);
  const [order, setOrder] = React.useState(initialOrder);
  const [toast, setToast] = React.useState(null);
  const [tab, setTab] = React.useState('details');
  const actions = ORDER_ACTIONS[order.status] || [];

  function showToast(msg, type = 'success') {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 4000);
  }

  async function executeAction(action) {
    const id = order.id;
    const now = new Date().toISOString();
    const method = action.method === 'HOOK' ? 'POST' : action.method;
    const resolvedPath = action.path.replace('{id}', id);
    if (method === 'GET') { showToast('GET actions are read-only — no change triggered'); return; }
    if (resolvedPath.includes('/returns') && method === 'POST') {
      showToast('Use the Returns form to create a return', 'error'); return;
    }

    let extraHeaders = {};
    let body = null;
    if (resolvedPath.includes('/webhooks/wms/booking-confirmed'))
      body = { orderId: id, wmsBookingRef: `WMS-${Date.now()}`, confirmedAt: now };
    else if (resolvedPath.includes('/webhooks/wms/wave-started')) {
      const idemKey = `wave-${id}-${Date.now()}`;
      extraHeaders = { 'X-Idempotency-Key': idemKey };
      body = { orderId: id, waveId: `WAVE-${Date.now()}`, startedAt: now };
    }
    else if (resolvedPath.includes('/webhooks/wms/pick-started'))
      body = { orderId: id, pickerId: 'PICKER-001', startedAt: now };
    else if (resolvedPath.includes('/webhooks/wms/pick-confirmed'))
      body = { orderId: id, lines: order.lines.map(l => ({ orderLineId: l.id, sku: l.sku, pickedQty: l.requestedAmount, substituted: false })), pickedAt: now };
    else if (resolvedPath.includes('/webhooks/wms/packed')) {
      const trackingId = `TRK-${id}-${Date.now()}`;
      body = { orderId: id, packages: [{ trackingId, vehicleType: 'Truck', weight: 5.0, lineIds: order.lines.map(l => l.id) }], packedAt: now };
    } else if (resolvedPath.includes('/webhooks/tms/package-dispatched')) {
      const tid = order.packages?.[0]?.trackingId;
      if (!tid) { showToast('No tracking ID — pack the order first (WMS Packed step)', 'error'); return; }
      body = { trackingId: tid, dispatchedAt: now };
    } else if (resolvedPath.includes('/webhooks/tms/package-delivered')) {
      const tid = order.packages?.[0]?.trackingId;
      if (!tid) { showToast('No tracking ID — dispatch the order first', 'error'); return; }
      body = { trackingId: tid, deliveredAt: now, recipientName: order.customer };
    } else if (resolvedPath.includes('/webhooks/tms/package-damage-reported')) {
      const tid = order.packages?.[0]?.trackingId;
      if (!tid) { showToast('No tracking ID — dispatch the order first', 'error'); return; }
      body = { trackingId: tid, reason: 'PhysicalDamage', driverNote: 'Damage reported via dashboard', reportedAt: now };
    } else if (resolvedPath.includes('/webhooks/pos/pos-collection-ready'))
      body = { orderId: id, storeId: order.storeId, notifiedAt: now };
    else if (resolvedPath.includes('/webhooks/pos/collected'))
      body = { orderId: id, collectedAt: now, collectedBy: order.customer };
    else if (resolvedPath.includes('/webhooks/pos/invoiced'))
      body = { orderId: id, invoiceNumber: `INV-${id}-${Date.now()}`, invoiceType: 'Standard', totalAmount: order.amount, currency: 'THB', invoicedAt: now };
    else if (resolvedPath.includes('/webhooks/pos/payment-confirmed'))
      body = { orderId: id, invoiceNumber: `INV-${id}`, paymentMethod: order.paymentMethod || 'Cash', paidAmount: order.amount, currency: 'THB', paidAt: now };
    else if (resolvedPath.includes('/hold') && !resolvedPath.includes('release'))
      body = { holdReason: 'Manual hold via dashboard', heldBy: 'dashboard-user' };
    else if (resolvedPath.includes('/release-hold'))
      body = { releasedBy: 'dashboard-user' };
    else if (resolvedPath.includes('/cancel'))
      body = { reason: 'Cancelled via dashboard', cancelledBy: 'dashboard-user' };
    else if (resolvedPath.includes('/partial-pick')) {
      const nonZeroLines = (order.lines || []).filter(l => l.requestedAmount > 1);
      if (!nonZeroLines.length) { showToast('No lines with quantity > 1 for partial pick', 'error'); return; }
      body = {
        lines: nonZeroLines.slice(0, 1).map(l => ({ orderLineId: l.id, pickedQuantity: l.requestedAmount - 1, orderedQuantity: l.requestedAmount, reason: 'OutOfStock' })),
        idempotencyKey: `pp-${Date.now()}`,
      };
    }

    const authHeader = _token ? { 'Authorization': `Bearer ${_token}` } : {};
    try {
      const res = await fetch(`${apiBase}${resolvedPath}`, {
        method,
        headers: { ...(body ? { 'Content-Type': 'application/json' } : {}), ...authHeader, ...extraHeaders },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        showToast(err.message || `Error ${res.status}: ${res.statusText}`, 'error');
        return;
      }
      showToast(`${action.label} — done`);
      const updatedRes = await fetch(`${apiBase}/orders/${id}`, { headers: authHeader });
      if (updatedRes.ok) {
        const updated = await updatedRes.json();
        setOrder(updated);
        if (onOrderUpdated) onOrderUpdated(updated);
      }
    } catch (e) {
      showToast(`Network error: ${e.message}`, 'error');
    }
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  return (
    <div className="max-w-4xl mx-auto p-4 pb-16">
      {toast && (
        <div className={`fixed top-4 right-4 z-50 max-w-sm px-4 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 animate-pulse
          ${toast.type === 'error' ? 'bg-red-100 text-red-800 border border-red-200' : 'bg-green-100 text-green-800 border border-green-200'}`}
          style={{ animation: 'none' }}>
          <span className="shrink-0 font-bold">{toast.type === 'error' ? '✗' : '✓'}</span>
          <span>{toast.msg}</span>
        </div>

      <button onClick={onBack} className="text-sm text-blue-600 hover:text-blue-800 mb-4 flex items-center gap-1">
        ← Back to Board
      </button>

      {/* Header */}
      <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 mb-4">
        <div className="flex items-start justify-between flex-wrap gap-3">
          <div>
            <div className="flex items-center gap-2 mb-1 flex-wrap">
              <h1 className="text-xl font-bold text-gray-900">{order.orderNumber || order.id}</h1>
              <Badge text={order.status} cls={STATUS_COLOR[order.status] || 'bg-gray-100 text-gray-700'} />
              <Badge text={order.type} cls={TYPE_BADGE[order.type] || 'bg-gray-100 text-gray-700'} />
              {order.orderNumber && (
                <span className="text-xs font-mono text-gray-400">#{order.id}</span>
              )}
            </div>
            <p className="text-sm text-gray-600 mt-0.5">{order.customer} · {order.store}</p>
            <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-2 text-xs text-gray-500">
              <span>Channel: <strong className="text-gray-700">{order.channelType}</strong></span>
              <span>·</span>
              <span>Payment: <strong className="text-gray-700">{order.paymentMethod}</strong></span>
              <span>·</span>
              <span>BU: <strong className="text-gray-700">{order.businessUnit}</strong></span>
              {order.substitutionFlag && <Badge text="Sub OK" cls="bg-amber-100 text-amber-700" />}
              {order.posRecalcPending && <Badge text="Recalc Pending" cls="bg-rose-100 text-rose-600" />}
              {order.preHoldStatus && (
                <span className="text-xs text-amber-600">Pre-hold: <strong>{order.preHoldStatus}</strong></span>
              )}
            </div>
            {order.holdReason && (
              <div className="mt-2 flex items-center gap-1 text-xs text-amber-700">
                <span>⚠</span><span>{order.holdReason}</span>
              </div>
            )}
          </div>
          <div className="text-right shrink-0">
            <div className="text-2xl font-bold text-gray-900">฿{order.amount?.toLocaleString()}</div>
            <div className="text-xs text-gray-400 mt-0.5">{order.items} items</div>
            {order.orderDate && (
              <div className="text-xs text-gray-400 mt-0.5">{formatDate(order.orderDate)}</div>

          </div>
        </div>
      </div>

      {/* Tab bar */}
      <div className="flex gap-1 mb-4 bg-gray-100 p-1 rounded-xl">
        {[['details', 'Details'], ['timeline', 'Live Timeline']].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)}
            className={`flex-1 py-1.5 rounded-lg text-sm font-medium transition-all ${tab === k ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}>

          </button>

      {tab === 'details' && (<>

      {tab === 'timeline' && <LiveTimeline orderId={order.id} apiBase={apiBase} />}
    </div>
  );
}

  { key: 'BookingConfirmed',   label: 'Booking',      top: 'border-t-blue-400'    },
  { key: 'PickStarted',        label: 'Picking',      top: 'border-t-sky-400'     },
  { key: 'PickConfirmed',      label: 'Pick Done',    top: 'border-t-cyan-500'    },
  { key: 'ReadyForCollection', label: 'Ready',        top: 'border-t-teal-400'    },
  { key: 'Packed',             label: 'Packed',       top: 'border-t-indigo-400'  },
  { key: 'OutForDelivery',     label: 'Dispatched',   top: 'border-t-purple-400'  },
  { key: 'Delivering',         label: 'Delivering',   top: 'border-t-purple-500'  },
  { key: 'Delivered',          label: 'Delivered',    top: 'border-t-green-400'   },
  { key: 'Collected',          label: 'Collected',    top: 'border-t-teal-500'    },
  { key: 'Invoiced',           label: 'Invoiced',     top: 'border-t-green-500'   },

  { key: 'Paid',               label: 'Paid',         top: 'border-t-emerald-500' },
  { key: 'Cancelled',          label: 'Cancelled',    top: 'border-t-red-400',    closed: true    },
  { key: 'Returned',           label: 'Returned',     top: 'border-t-rose-400',   closed: true    },
];

const PO_STATUSES = ['Created', 'PartiallyReceived', 'FullyReceived', 'Closed'];
const TO_STATUSES = ['Created', 'PickConfirmed', 'InTransit', 'Received', 'Completed'];

function OrderCard({ order, onClick }) {
  const urg     = orderUrgency(order);
  const slot    = order.deliverySlot;
  const slotUrg = slotUrgency(slot);
  const borderCls = urg === 'critical'
    ? 'border-red-300 bg-red-50 hover:border-red-400'
    : urg === 'warning'
    ? 'border-amber-300 bg-amber-50 hover:border-amber-400'
    : 'border-gray-200 bg-white hover:border-blue-300';
  return (
    <button
      onClick={() => onClick(order)}
      className={`w-full text-left border rounded-xl p-3 mb-2 hover:shadow-md transition-all cursor-pointer ${borderCls}`}>
      <div className="flex items-center justify-between mb-1 gap-1">
        <span className="font-mono text-xs font-bold text-gray-700 truncate">{order.orderNumber || order.id}</span>
        <Badge text={order.type} cls={`${TYPE_BADGE[order.type] || 'bg-gray-100 text-gray-700'} shrink-0`} />
      </div>
      <div className="text-sm font-medium text-gray-800 truncate">{order.customer}</div>
      <div className="flex items-center justify-between mt-1">
        <span className="text-xs text-gray-400">{order.items} items · {order.store}</span>
        <span className="text-xs font-bold text-gray-700">฿{order.amount?.toLocaleString()}</span>
      </div>
      {order.orderDate && (
        <div className="text-xs text-gray-400 mt-1">{fmtOrderTime(order.orderDate)}</div>
      )}
      {slot && (
        <div className={`mt-1.5 text-xs font-medium flex items-center gap-1
          ${slotUrg === 'overdue' ? 'text-red-600'
          : slotUrg === 'active'  ? 'text-orange-600'
          : slotUrg === 'soon'    ? 'text-amber-600'
          :                         'text-blue-500'}`}>
          <span>{slotUrg === 'overdue' ? '⚠' : slotUrg === 'active' ? '⏱' : '🕐'}</span>
          <span>
            {new Date(slot.scheduledStart).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}–{new Date(slot.scheduledEnd).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})}
            {slotUrg === 'overdue' ? ' · Late' : slotUrg === 'active' ? ' · Active' : slotUrg === 'soon' ? ' · Soon' : ''}
          </span>
        </div>
      )}
      {order.holdReason && (
        <div className="mt-1 text-xs text-red-700 font-semibold flex items-center gap-1">
          <span>🚨</span><span>{order.holdReason}</span>
        </div>
      )}
      {order.posRecalcPending && (
        <div className="mt-1 text-xs text-amber-700 font-medium">⚠ Recalc Pending</div>
      )}
    </button>
  );
}

        <Badge text={po.status} cls={STATUS_COLOR[po.status] || 'bg-gray-100 text-gray-700'} />

      <div className="text-sm font-medium text-gray-800 truncate">{po.supplier}</div>

      <div className="text-xs font-bold text-gray-700 mt-0.5">฿{po.value?.toLocaleString()}</div>

}

      <div className="flex items-center justify-between mb-1 gap-1">
        <span className="font-mono text-xs font-bold text-amber-700">{to.id}</span>

      <div className="text-sm text-gray-700">{to.source} → {to.dest}</div>

        {to.lineCount} lines{to.tracking ? ` · ${to.tracking}` : ''}

function ReturnCard({ ret }) {
  return (
    <div className="bg-white border border-gray-200 rounded-xl p-3 mb-2">
      <div className="flex items-center justify-between mb-1 gap-1">
        <span className="font-mono text-xs font-bold text-rose-700">{ret.returnOrderNumber}</span>
        <Badge text={ret.status} cls={RETURN_STATUS_COLOR[ret.status] || 'bg-gray-100 text-gray-700'} />
      </div>
      <div className="text-xs text-gray-600 font-mono">{ret.orderId}</div>
      <div className="text-xs text-gray-500 mt-0.5">
        {ret.returnReason} · {ret.items.length} item{ret.items.length !== 1 ? 's' : ''}
      </div>

function KPISummary({ orders }) {
  const active    = orders.filter(o => !['Paid','Cancelled','Returned'].includes(o.status));
  const attention = orders.filter(o => orderUrgency(o) !== null);
  const onHold    = orders.filter(o => o.status === 'OnHold');
  const paidRev   = orders.filter(o => o.status === 'Paid').reduce((s, o) => s + (o.amount || 0), 0);
  const kpis = [
    { label: 'Active Orders',   value: active.length,               sub: `of ${orders.length} total`,                              color: 'blue'    },
    { label: 'Needs Attention', value: attention.length,             sub: 'hold · late · recalc',                                   color: attention.length > 0 ? 'red' : 'gray' },
    { label: 'On Hold',         value: onHold.length,                sub: onHold.map(o => o.id).join(', ') || 'none',               color: onHold.length > 0 ? 'amber' : 'gray' },
    { label: 'Paid Revenue',    value: `฿${paidRev.toLocaleString()}`, sub: `${orders.filter(o => o.status === 'Paid').length} orders paid`, color: 'emerald' },
  ];
  const C = {
    blue:    { bg: 'bg-blue-50',    bd: 'border-blue-200',    val: 'text-blue-700',    sub: 'text-blue-500'    },
    red:     { bg: 'bg-red-50',     bd: 'border-red-200',     val: 'text-red-700',     sub: 'text-red-500'     },
    amber:   { bg: 'bg-amber-50',   bd: 'border-amber-200',   val: 'text-amber-700',   sub: 'text-amber-500'   },
    emerald: { bg: 'bg-emerald-50', bd: 'border-emerald-200', val: 'text-emerald-700', sub: 'text-emerald-500' },
    gray:    { bg: 'bg-gray-50',    bd: 'border-gray-200',    val: 'text-gray-600',    sub: 'text-gray-400'    },
  };
  return (
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
      {kpis.map(k => {
        const c = C[k.color];
        return (
          <div key={k.label} className={`${c.bg} border ${c.bd} rounded-xl px-4 py-3`}>
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">{k.label}</div>
            <div className={`text-2xl font-black ${c.val}`}>{k.value}</div>
            <div className={`text-xs mt-0.5 truncate ${c.sub}`}>{k.sub}</div>
          </div>
        );
      })}
    </div>
  );
}

function AttentionBanner({ orders }) {
  const flagged = orders
    .filter(o => orderUrgency(o) !== null)
    .sort((a, b) => (orderUrgency(a) === 'critical' ? -1 : 1));
  if (flagged.length === 0) return null;
  return (
    <div className="mb-4 border border-red-200 rounded-xl p-3 bg-red-50">
      <div className="flex items-center gap-2 mb-2">
        <span className="text-sm font-bold text-red-700">Needs Attention</span>
        <span className="text-xs text-red-600 bg-red-100 border border-red-200 rounded-full px-2 py-0.5 font-semibold">{flagged.length}</span>
      </div>
      <div className="flex flex-wrap gap-2">
        {flagged.map(o => {
          const urg = orderUrgency(o);
          const reason = o.holdReason
            ? o.holdReason
            : o.posRecalcPending
            ? 'Recalc Pending'
            : slotUrgency(o.deliverySlot) === 'overdue'
            ? 'Slot Overdue'
            : 'Slot Active';
          return (
            <div key={o.id} className={`inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-medium border
              ${urg === 'critical' ? 'bg-red-100 border-red-300 text-red-800' : 'bg-amber-100 border-amber-300 text-amber-800'}`}>
              <span>{urg === 'critical' ? '🚨' : '⚠'}</span>
              <span className="font-mono font-bold">{o.id}</span>
              <span>·</span>
              <span>{reason}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function KanbanCol({ col, cards, onCardClick }) {
  const bgCls    = col.exception ? 'bg-red-50'   : 'bg-gray-50';
  const countCls = col.exception
    ? 'bg-red-100 border-red-200 text-red-700'
    : 'bg-white border-gray-200 text-gray-500';
  const lblCls   = col.exception ? 'text-red-600' : 'text-gray-500';
  return (
    <div className={`kanban-col ${bgCls} rounded-xl border-t-4 ${col.top} border border-gray-200 p-3 flex flex-col`}>
      <div className="flex items-center justify-between mb-3 shrink-0">
        <span className={`text-xs font-bold uppercase tracking-wider truncate ${lblCls}`}>
          {col.exception && '⚠ '}{col.label}
        </span>
        <span className={`ml-1 border text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold shrink-0 ${countCls}`}>
          {cards.length}
        </span>
      </div>
      <div className="flex-1 overflow-y-auto" style={{ maxHeight: 520 }}>
        {cards.length === 0
          ? <div className="text-xs text-gray-300 text-center py-6">—</div>
          : cards.map(o => <OrderCard key={o.id} order={o} onClick={onCardClick} />)
        }
      </div>
    </div>
  );
}

function InboundMiniKanban({ title, badge, statuses, items, renderCard, borderColor }) {
  return (
    <div>
      <div className="flex items-center gap-2 mb-3">
        <h2 className="font-semibold text-gray-800 text-sm">{title}</h2>
        <Badge text={badge.text} cls={badge.cls} />
        <span className="text-xs text-gray-400">{items.length} total</span>
      </div>
      <div className="kanban-scroll">
        <div className="flex gap-3" style={{ minWidth: 'max-content' }}>
          {statuses.map(status => {
            const cards = items.filter(i => i.status === status);
            return (
              <div key={status} className={`min-w-52 max-w-52 bg-gray-50 rounded-xl border-t-4 ${borderColor} border border-gray-200 p-3`}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-xs font-bold text-gray-500 uppercase tracking-wide truncate mr-1">{status}</span>
                  <span className="text-xs text-gray-400 font-medium shrink-0">{cards.length}</span>
                </div>
                {cards.length === 0
                  ? <div className="text-xs text-gray-300 py-3 text-center">—</div>
                  : cards.map(c => renderCard(c))
                }
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function KanbanBoard({ onOrderClick }) {
  const { orders, purchaseOrders, transferOrders, returns } = React.useContext(DataContext);
  const [tab, setTab]                   = useState('outbound');
  const [showClosed, setShowClosed]     = useState(false);
  const [selectedStore, setSelectedStore] = useState('All');

  const stores = React.useMemo(
    () => ['All', ...[...new Set(orders.map(o => o.store))].sort()],
    [orders]
  );

  const filteredOrders = selectedStore === 'All'
    ? orders
    : orders.filter(o => o.store === selectedStore);

  const visibleCols = showClosed
    ? OUTBOUND_COLS
    : OUTBOUND_COLS.filter(c => !c.closed);

  const grouped = OUTBOUND_COLS.reduce((acc, col) => {
    acc[col.key] = filteredOrders.filter(o => o.status === col.key);
    return acc;
  }, {});

  const closedCount = filteredOrders.filter(o => {
    const col = OUTBOUND_COLS.find(c => c.key === o.status);
    return col && col.closed;
  }).length;

  return (
    <div className="p-4 pb-16">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-xl font-bold text-gray-900">Order Board</h1>
          <p className="text-xs text-gray-400 mt-0.5">Simulated: Jan 15, 2024 · 16:00 · click any card for details</p>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <select
            value={selectedStore}
            onChange={e => setSelectedStore(e.target.value)}
            className="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white text-gray-700 focus:outline-none focus:border-blue-400">
            {stores.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
            {[['outbound', 'Outbound'], ['inbound', 'Inbound']].map(([key, label]) => (
              <button key={key} onClick={() => setTab(key)}
                className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${tab === key ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {tab === 'outbound' && (
        <>
          <KPISummary orders={filteredOrders} />
          <AttentionBanner orders={filteredOrders} />
          <div className="flex items-center justify-end mb-3">
            <button
              onClick={() => setShowClosed(v => !v)}
              className="text-xs text-gray-500 hover:text-gray-700 border border-gray-200 hover:border-gray-300 px-3 py-1.5 rounded-lg bg-white transition-colors">
              {showClosed ? '▼ Hide Closed' : `▶ Show Closed (${closedCount})`}
            </button>
          </div>
          <div className="kanban-scroll">
            <div className="flex gap-3" style={{ minWidth: 'max-content' }}>
              {visibleCols.map(col => (
                <KanbanCol key={col.key} col={col} cards={grouped[col.key] || []} onCardClick={onOrderClick} />
              ))}
            </div>
          </div>
        </>
      )}

      {tab === 'inbound' && (
        <div className="flex flex-col gap-8">
          <InboundMiniKanban
            title="Purchase Orders" badge={{ text: 'PO', cls: 'bg-violet-100 text-violet-700 border border-violet-200' }}
            statuses={PO_STATUSES} items={purchaseOrders} borderColor="border-t-violet-400"
            renderCard={p => <POCard key={p.id} po={p} />}
          />
          <InboundMiniKanban
            title="Transfer Orders" badge={{ text: 'TO', cls: 'bg-amber-100 text-amber-700 border border-amber-200' }}
            statuses={TO_STATUSES} items={transferOrders} borderColor="border-t-amber-400"
            renderCard={t => <TOCard key={t.id} to={t} />}
          />
          <InboundMiniKanban
            title="Returns" badge={{ text: 'RET', cls: 'bg-rose-100 text-rose-700 border border-rose-200' }}
            statuses={RETURN_STATUSES} items={returns} borderColor="border-t-rose-400"
            renderCard={r => <ReturnCard key={r.id} ret={r} />}
          />
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────

// Unit dots — each circle is one physical unit coloured by who consumed it
function UnitDots({ orders, total }) {
  const consumed = orders.reduce((s, o) => s + o.qty, 0);
  const units = [
    ...orders.flatMap(o => Array(o.qty).fill(o)),
    ...Array(total - consumed).fill(null),
  ];
  return (
    <div className="flex gap-2 flex-wrap justify-center">
      {units.map((o, i) => (
        <div key={i} className="flex flex-col items-center gap-1">
          <div className={`w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-sm shadow
            ${o ? o.dotCls : 'bg-gray-200 text-gray-400'}`}>
            {i + 1}
          </div>
          <span className={`text-xs font-medium ${o ? o.labelCls : 'text-gray-400'}`}>
            {o ? o.id : '—'}
          </span>
        </div>
      ))}
    </div>
  );
}

// Proportional allocation bar
function SegmentedBar({ orders, total }) {
  const remaining = total - orders.reduce((s, o) => s + o.qty, 0);
  const segments = [
    ...orders.map(o => ({ label: `${o.id} (${o.qty} units)`, pct: (o.qty / total) * 100, cls: o.barCls })),
    { label: `Remaining (${remaining})`, pct: (remaining / total) * 100, cls: 'bg-gray-200' },
  ];
  return (
    <div>
      <div className="flex h-8 rounded-xl overflow-hidden gap-0.5">
        {segments.map((s, i) => (
          <div key={i} style={{ width: `${s.pct}%` }}
            className={`${s.cls} flex items-center justify-center text-white text-xs font-bold transition-all`}>
            {s.pct >= 15 && `${Math.round(s.pct)}%`}
          </div>
        ))}
      </div>
      <div className="flex gap-4 mt-2 flex-wrap">
        {segments.map((s, i) => (
          <div key={i} className="flex items-center gap-1.5">
            <div className={`w-3 h-3 rounded ${s.cls}`} />
            <span className="text-xs text-gray-600">{s.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

          {step.optional && <span className="text-xs text-gray-400 italic">optional</span>}
        </div>
        <div className="text-sm font-semibold text-gray-800 mt-1">{step.label}</div>
        {step.note && <div className="text-xs text-gray-500 mt-0.5 leading-relaxed">{step.note}</div>}
      </div>
    </div>
  );
}

function LiveStockLedgerView({ ledger }) {
  if (!ledger) return (
    <div className="text-center py-12 text-gray-400 text-sm">
      Live stock data unavailable — start the API at <code className="bg-gray-100 px-1 rounded">http://localhost:5050</code> and reload.
    </div>
  );

  const allTotal = Math.max(
    1,
    ...ledger.locations.flatMap(loc => loc.events.map(e => e.balance))
  );

  return (
    <div className="space-y-6">
      <div>
        <div className="flex items-center gap-3 flex-wrap mb-1">
          <span className="font-mono font-bold text-lg text-gray-900">{ledger.sku}</span>
          <span className="text-gray-400">—</span>
          <span className="text-gray-700">{ledger.skuName}</span>
          <span className="text-xs bg-gray-100 text-gray-600 border border-gray-200 px-2 py-0.5 rounded font-mono">฿{ledger.unitPrice}/unit</span>
          <span className="text-xs bg-green-100 text-green-700 border border-green-200 px-2 py-0.5 rounded font-medium">Live from API</span>
        </div>
        <p className="text-sm text-gray-500">Real-time stock movements computed from OMS order and inbound data.</p>
      </div>

      {ledger.locations.length === 0 ? (
        <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 text-center text-gray-400 text-sm">
          No stock movements recorded yet for {ledger.sku}.
        </div>
      ) : ledger.locations.map(loc => (
        <div key={loc.storeId} className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
          <div className="flex items-center gap-3 mb-4 flex-wrap">
            <span className="font-semibold text-gray-800">{loc.storeName}</span>
            <span className="font-mono text-xs text-gray-400">{loc.storeId}</span>
            <span className={`text-xs px-2 py-0.5 rounded font-mono font-bold border
              ${loc.balance > 0 ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-red-100 text-red-600 border-red-200'}`}>
              Balance: {loc.balance}
            </span>
          </div>
          {loc.events.length === 0 ? (
            <div className="text-xs text-gray-300 py-4 text-center">No events</div>
          ) : (
            <LedgerTable ledger={loc.events} total={allTotal} />
          )}
        </div>
      ))}
    </div>
  );
}

function StockFlowView() {
  const { stockLedger } = React.useContext(DataContext);
  const [activeCase, setActiveCase] = React.useState(stockLedger ? 'live' : 'case1');
  const cases = [
    ...(stockLedger ? [{ key: 'live', label: 'Live — API Stock Ledger' }] : []),
    { key: 'case1', label: 'Case 1 — PO → Orders' },
    { key: 'case2', label: 'Case 2 — PO → Transfer → Orders' },
    { key: 'case3', label: 'Case 3 — Oversell + Cancellation + Substitution' },
    { key: 'case4', label: 'Case 4 — Customer Return' },
  ];
  return (
    <div className="max-w-4xl mx-auto p-4 pb-16">
      <div className="flex gap-1 bg-gray-100 rounded-xl p-1 mb-6 flex-wrap">
        {cases.map(({ key, label }) => (
          <button key={key} onClick={() => setActiveCase(key)}
            className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all
              ${activeCase === key ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}>
            {label}
          </button>
        ))}
      </div>
      {activeCase === 'live'  && <LiveStockLedgerView ledger={stockLedger} />}
      {activeCase === 'case1' && <StockFlowCase1 />}
      {activeCase === 'case2' && <TransferFlowCase />}
      {activeCase === 'case3' && <StockFlowCase3 />}
      {activeCase === 'case4' && <StockFlowCase4 />}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// APP SHELL
// ─────────────────────────────────────────────────────────────

const NAV_TABS = [
  { key: 'kanban',    label: 'Orders'         },
  { key: 'prepaid',   label: 'Prepaid Flow'   },
  { key: 'pod',       label: 'POD Flow'       },
  { key: 'usecases',  label: 'Use Cases'      },
  { key: 'stockflow', label: 'Stock Flow'     },
  { key: 'apiref',    label: 'API Reference'  },
];

function App() {
  const [view, setView]               = useState('kanban');
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [timelineOrderId, setTimelineOrderId] = useState(null);

  const handleNavClick = useCallback(key => {
    setView(key);
    if (key !== 'kanban') setSelectedOrder(null);
    if (key !== 'timeline') setTimelineOrderId(null);
  }, []);

  const openOrderDetail = useCallback(order => setSelectedOrder(order), []);
  const closeOrderDetail = useCallback(() => setSelectedOrder(null), []);
  const handleOrderUpdated = useCallback(updated => setSelectedOrder(updated), []);

  return (
    <div className="min-h-screen bg-slate-50">
      <header className="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
        <div className="max-w-screen-2xl mx-auto px-4 h-12 flex items-center gap-3">
          <div className="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center shrink-0">
            <span className="text-white font-bold text-sm">O</span>
          </div>
          <span className="font-bold text-gray-900 text-sm mr-4">Sprint Connect OMS</span>
          <span className="text-xs px-2 py-0.5 rounded border font-medium mr-2 bg-green-100 text-green-700 border-green-200">
            ● API
          </span>
          <nav className="flex gap-0.5">
            {NAV_TABS.map(({ key, label }) => (
              <button key={key} onClick={() => handleNavClick(key)}
                className={`px-3 py-1.5 rounded-md text-sm font-medium transition-colors
                  ${view === key ? 'bg-blue-50 text-blue-700' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-800'}`}>
                {label}
              </button>
            ))}
          </nav>
          {view === 'kanban' && selectedOrder && (
            <span className="ml-3 text-xs text-gray-400">
              Order: <span className="font-mono text-gray-600 font-medium">{selectedOrder.id}</span>
              <button onClick={closeOrderDetail} className="ml-2 text-gray-400 hover:text-gray-600">✕</button>
            </span>
          )}
        </div>
      </header>

      <main className="max-w-screen-2xl mx-auto">
        {view === 'kanban'    && !selectedOrder && <KanbanBoard onOrderClick={openOrderDetail} />}
        {view === 'kanban'    &&  selectedOrder && (
          <OrderDetailView
            order={selectedOrder}
            onBack={closeOrderDetail}
            onViewTimeline={() => { setTimelineOrderId(selectedOrder.id); setView('timeline'); }}
            onOrderUpdated={handleOrderUpdated}
          />
        )}
        {view === 'timeline'  && <OrderTimeline onBack={() => { setView('kanban'); setTimelineOrderId(null); }} orderId={timelineOrderId} />}
        {view === 'prepaid'   && <PrepaidFlowView />}
        {view === 'pod'       && <PODFlowView />}
        {view === 'usecases'  && <UseCaseExplorer />}
        {view === 'stockflow' && <StockFlowView />}
        {view === 'apiref'    && <ApiReferenceView />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <DataProvider><App /></DataProvider>
);
</script>
</body>
